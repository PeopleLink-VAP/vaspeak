<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Inter:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f4a806",
                        "background-light": "#fffbf1",
                        "background-dark": "#231d0f",
                        "navy-custom": "#1b365d",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"],
                        "body": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "2xl": "16px",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>Listening Decoding Lesson</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<!-- Top Navigation Bar -->
<header class="sticky top-0 z-10 flex flex-col bg-background-light/90 backdrop-blur-md px-4 py-3">
<div class="flex items-center justify-between gap-4">
<button class="flex items-center justify-center text-navy-custom dark:text-slate-100">
<span class="material-symbols-outlined text-2xl font-bold">close</span>
</button>
<div class="flex-1 px-2">
<div class="h-3 w-full rounded-full bg-primary/20">
<div class="h-3 rounded-full bg-primary" style="width: 25%;"></div>
</div>
</div>
<div class="flex items-center gap-1 bg-white dark:bg-slate-800 px-3 py-1 rounded-full shadow-sm">
<span class="text-primary font-bold text-sm">5</span>
<span class="text-red-500 text-sm">❤️</span>
</div>
</div>
<div class="mt-2 text-center">
<p class="text-[10px] uppercase tracking-widest font-bold text-primary/80">Block 1: Listening Decoding</p>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col p-6 gap-8">
<!-- Instruction -->
<div class="text-center">
<h1 class="text-navy-custom dark:text-slate-100 text-xl md:text-2xl font-bold leading-tight">
                    Listen to the client's request and type what you hear.
                </h1>
</div>
<!-- Audio Card Component -->
<div class="bg-white dark:bg-slate-800 rounded-2xl p-8 shadow-[0_8px_30px_rgb(27,54,93,0.08)] flex flex-col items-center gap-6 border border-primary/10">
<div class="relative group cursor-pointer">
<div class="absolute inset-0 bg-primary/20 rounded-full scale-125 blur-xl group-hover:bg-primary/30 transition-all"></div>
<button class="relative bg-primary text-navy-custom h-24 w-24 rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-transform">
<span class="material-symbols-outlined text-5xl fill-1">play_arrow</span>
</button>
</div>
<!-- Waveform Visualizer Placeholder -->
<div class="w-full flex items-center justify-center gap-1 h-12">
<div class="w-1.5 h-4 bg-primary/40 rounded-full"></div>
<div class="w-1.5 h-6 bg-primary/60 rounded-full"></div>
<div class="w-1.5 h-10 bg-primary rounded-full"></div>
<div class="w-1.5 h-8 bg-primary rounded-full"></div>
<div class="w-1.5 h-12 bg-primary rounded-full"></div>
<div class="w-1.5 h-6 bg-primary/80 rounded-full"></div>
<div class="w-1.5 h-9 bg-primary rounded-full"></div>
<div class="w-1.5 h-4 bg-primary/40 rounded-full"></div>
<div class="w-1.5 h-7 bg-primary/60 rounded-full"></div>
<div class="w-1.5 h-11 bg-primary rounded-full"></div>
<div class="w-1.5 h-5 bg-primary/50 rounded-full"></div>
<div class="w-1.5 h-8 bg-primary/70 rounded-full"></div>
</div>
<!-- Slow Playback Button -->
<button class="flex items-center gap-2 px-5 py-2.5 bg-background-light dark:bg-slate-700 border border-primary/30 rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-primary text-xl">egg</span>
<span class="text-navy-custom dark:text-slate-200 text-sm font-semibold">Slow Playback</span>
</button>
</div>
<!-- Transcription Input Area -->
<div class="flex flex-col gap-2">
<label class="text-navy-custom/60 dark:text-slate-400 text-xs font-bold uppercase tracking-wider ml-1">Your Transcription</label>
<div class="relative group">
<textarea class="form-textarea font-body w-full min-h-[160px] p-5 rounded-2xl border-2 border-primary/20 bg-white dark:bg-slate-800 text-navy-custom dark:text-slate-100 text-lg leading-relaxed focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all placeholder:text-navy-custom/30" placeholder="Type the client's request exactly as heard..."></textarea>
</div>
</div>
</main>
<!-- Bottom CTA Bar -->
<footer class="sticky bottom-0 bg-background-light dark:bg-background-dark p-4 border-t border-primary/10">
<div class="max-w-md mx-auto">
<button class="w-full bg-primary hover:bg-[#e09b05] active:translate-y-1 text-navy-custom font-bold text-lg py-4 rounded-2xl shadow-[0_4px_0_rgb(210,145,0)] transition-all flex items-center justify-center gap-2">
                    Check Answer
                    <span class="material-symbols-outlined font-bold">arrow_forward</span>
</button>
</div>
<!-- iOS Home Indicator Spacing -->
<div class="h-6"></div>
</footer>
</div>
<!-- Background Decorative Element -->
<div class="fixed top-0 right-0 -z-10 opacity-20 pointer-events-none">
<div class="w-64 h-64 bg-primary rounded-full blur-[100px] -mr-32 -mt-32"></div>
</div>
<div class="fixed bottom-0 left-0 -z-10 opacity-10 pointer-events-none">
<div class="w-80 h-80 bg-navy-custom rounded-full blur-[120px] -ml-40 -mb-40"></div>
</div>
</body></html>
