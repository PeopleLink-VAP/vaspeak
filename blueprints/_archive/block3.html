<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Inter:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f4a806",
                        "navy": "#1B365D",
                        "background-light": "#FFFBF1",
                        "background-dark": "#231d0f",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"],
                        "body": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "2xl": "16px",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>VASpeak - AI Roleplay Lesson</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light font-display antialiased">
<div class="relative flex h-screen w-full max-w-md mx-auto flex-col bg-background-light overflow-hidden shadow-2xl">
<header class="flex flex-col gap-2 p-4 pt-6">
<div class="flex items-center justify-between gap-4">
<button class="text-navy flex size-10 shrink-0 items-center justify-center hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
<div class="flex-1 px-2">
<div class="h-3 w-full rounded-full bg-primary/20 overflow-hidden">
<div class="h-full rounded-full bg-primary" style="width: 75%;"></div>
</div>
</div>
<div class="flex items-center gap-1 min-w-[50px] justify-end">
<span class="text-primary font-bold">5</span>
<span class="material-symbols-outlined text-primary fill-1" style="font-variation-settings: 'FILL' 1">favorite</span>
</div>
</div>
<div class="flex justify-center">
<span class="text-[10px] uppercase tracking-widest font-bold text-primary/60">Block 3: AI Roleplay</span>
</div>
</header>
<main class="flex-1 flex flex-col px-4 overflow-y-auto">
<div class="py-6">
<h1 class="text-navy text-xl font-bold leading-tight tracking-tight">
                    Speak to the client: Apologize for the delay and offer a solution.
                </h1>
</div>
<div class="flex flex-col gap-6">
<div class="flex items-start gap-3">
<div class="size-10 rounded-full bg-slate-200 shrink-0 overflow-hidden border-2 border-white shadow-sm">
<img class="w-full h-full object-cover" data-alt="AI professional client avatar" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAbkYz1pHZQmJ1vkkZxsXSOifZ4rr7VwN6DrNtG7uiCfulUPc6NJFbI9WIpMbgzrjoZ98c2qpo7rRUManioYQUy8abD9KP259VlisrD5L4YoRxbwfsKiiUef1udowIKrf1XJ9kmVCwEx3FU8LUwUM4aqPR-NzRV6xd7xGSAzqotsK2nKBgoyFkAUhYODmbsaUJlhZCTdym3IvFAmkaAs55FUVqwZ8AJSiKOT_3oAs5g7KmplIEEWfXyth5biHDURisIBrNSTE4I4g8"/>
</div>
<div class="flex flex-col gap-1.5 items-start max-w-[80%]">
<span class="text-[11px] font-bold text-navy/50 uppercase ml-2 tracking-wider">AI Client</span>
<div class="rounded-2xl rounded-tl-none px-5 py-4 bg-white shadow-sm border border-navy/5">
<p class="text-navy text-base leading-relaxed">
                                I've been waiting for my video edit for 2 days. What's going on?
                            </p>
</div>
</div>
</div>
<div class="flex items-start gap-3 justify-end">
<div class="flex flex-col gap-1.5 items-end max-w-[80%]">
<span class="text-[11px] font-bold text-primary/70 uppercase mr-2 tracking-wider">Your Turn</span>
<div class="rounded-2xl rounded-tr-none px-5 py-4 bg-primary/10 border-2 border-dashed border-primary/30 flex items-center gap-2">
<span class="text-primary font-medium italic italic">Waiting for your response...</span>
</div>
</div>
<div class="size-10 rounded-full bg-primary/20 shrink-0 flex items-center justify-center border-2 border-white shadow-sm">
<span class="material-symbols-outlined text-primary">person</span>
</div>
</div>
</div>
</main>
<section class="flex flex-col items-center justify-center py-10 gap-4 bg-gradient-to-t from-white to-transparent">
<div class="relative group">
<div class="absolute inset-0 bg-primary/20 rounded-full scale-110 animate-pulse"></div>
<button class="relative size-24 rounded-full bg-primary flex items-center justify-center shadow-lg shadow-primary/30 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-white text-4xl" style="font-variation-settings: 'FILL' 1">mic</span>
</button>
</div>
<p class="font-body text-navy/60 text-sm font-medium tracking-wide">Tap to record your response</p>
</section>
<footer class="p-4 bg-white border-t border-navy/5 pb-8">
<button class="w-full py-4 rounded-xl bg-slate-200 text-slate-400 font-bold text-lg cursor-not-allowed transition-all uppercase tracking-wider" disabled="">
                Check
            </button>
</footer>
</div>
<style>
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.4); opacity: 0; }
            100% { transform: scale(1); opacity: 0; }
        }
        .animate-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</body></html>
