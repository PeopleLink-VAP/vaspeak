<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Inter:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f4a806",
                        "primary-dark": "#1b365d",
                        "background-light": "#fffbf1",
                        "background-dark": "#1b1a17",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"],
                        "body": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-primary-dark">
<div class="relative flex min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden max-w-md mx-auto">
<!-- Header -->
<div class="flex items-center p-4 pb-2 justify-between">
<div class="text-primary-dark dark:text-primary flex size-12 shrink-0 items-center justify-start">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</div>
<h2 class="text-primary-dark dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12">VASpeak</h2>
</div>
<!-- Progress Bar -->
<div class="flex flex-col gap-2 p-4">
<div class="flex gap-6 justify-between items-center">
<p class="text-primary-dark dark:text-slate-200 text-sm font-semibold">Onboarding</p>
<p class="text-primary-dark dark:text-slate-400 text-xs font-medium">Step 2 of 4</p>
</div>
<div class="h-2 w-full rounded-full bg-primary/20">
<div class="h-2 rounded-full bg-primary" style="width: 50%;"></div>
</div>
</div>
<!-- Welcome Illustration Area -->
<div class="px-4 py-4">
<div class="w-full aspect-video rounded-2xl bg-gradient-to-br from-primary to-primary-dark flex items-center justify-center overflow-hidden relative" data-alt="Friendly illustration of a virtual assistant learning English">
<div class="absolute inset-0 opacity-20">
<svg height="100%" preserveaspectratio="none" viewbox="0 0 100 100" width="100%">
<path d="M0,50 Q25,0 50,50 T100,50" fill="transparent" stroke="white" stroke-width="2"></path>
<path d="M0,70 Q25,20 50,70 T100,70" fill="transparent" stroke="white" stroke-width="2"></path>
</svg>
</div>
<span class="material-symbols-outlined text-white text-7xl">record_voice_over</span>
</div>
</div>
<!-- Text Content -->
<div class="px-6 text-center">
<h1 class="text-primary-dark dark:text-slate-100 text-3xl font-bold leading-tight pt-4">Welcome to VASpeak!</h1>
<p class="text-primary-dark/70 dark:text-slate-400 font-body text-base leading-relaxed pt-2">Let's personalize your learning journey.</p>
<h3 class="text-primary-dark dark:text-slate-100 text-lg font-bold mt-8 mb-4">What is your current English speaking level?</h3>
</div>
<!-- Selection Cards -->
<div class="flex flex-col gap-4 px-6 pb-24">
<!-- Level 1 -->
<button class="flex items-center gap-4 p-5 rounded-2xl bg-white dark:bg-slate-800 border-2 border-transparent shadow-[0_4px_12px_rgba(27,54,93,0.08)] transition-all text-left">
<div class="bg-primary/10 p-3 rounded-xl">
<span class="material-symbols-outlined text-primary">sentiment_satisfied</span>
</div>
<div class="flex flex-col">
<span class="text-primary-dark dark:text-slate-100 font-bold text-base leading-tight">Level 1: Beginner</span>
<span class="text-primary-dark/60 dark:text-slate-400 font-body text-xs mt-1">Basic words, struggle with sentences</span>
</div>
</button>
<!-- Level 2 - SELECTED -->
<button class="flex items-center gap-4 p-5 rounded-2xl bg-primary/10 dark:bg-primary/20 border-2 border-primary shadow-[0_8px_16px_rgba(244,168,6,0.15)] transition-all text-left relative overflow-hidden">
<div class="bg-primary p-3 rounded-xl">
<span class="material-symbols-outlined text-white">sentiment_very_satisfied</span>
</div>
<div class="flex flex-col">
<span class="text-primary-dark dark:text-slate-100 font-bold text-base leading-tight">Level 2: Intermediate</span>
<span class="text-primary-dark/70 dark:text-slate-300 font-body text-xs mt-1">Communicate but lack confidence</span>
</div>
<div class="absolute right-4 top-1/2 -translate-y-1/2">
<span class="material-symbols-outlined text-primary fill-1">check_circle</span>
</div>
</button>
<!-- Level 3 -->
<button class="flex items-center gap-4 p-5 rounded-2xl bg-white dark:bg-slate-800 border-2 border-transparent shadow-[0_4px_12px_rgba(27,54,93,0.08)] transition-all text-left">
<div class="bg-primary/10 p-3 rounded-xl">
<span class="material-symbols-outlined text-primary">psychology</span>
</div>
<div class="flex flex-col">
<span class="text-primary-dark dark:text-slate-100 font-bold text-base leading-tight">Level 3: Working VA</span>
<span class="text-primary-dark/60 dark:text-slate-400 font-body text-xs mt-1">Speak well, need industry vocab</span>
</div>
</button>
</div>
<!-- Footer Button -->
<div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-background-light dark:from-background-dark via-background-light dark:via-background-dark to-transparent max-w-md mx-auto">
<button class="w-full bg-primary hover:bg-primary/90 text-primary-dark font-bold py-4 px-8 rounded-2xl shadow-lg transition-transform active:scale-95 text-lg">
                Continue
            </button>
</div>
</div>
</body></html>
